spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/issue_tracker_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false

  jackson:
    serialization:
      fail-on-empty-beans: false

app:
  jwt:
    secret: ${JWT_SECRET:your-super-secret-key-that-is-at-least-256-bits-long-change-in-prod-12345}
    expiration-ms: 86400000

server:
  port: ${PORT:8080}
